<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sewa Badak</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #00C853;
            --green-dark: #00A846;
            --green-glow: rgba(0, 200, 83, 0.3);
            --bg: #0A0F0A;
            --surface: #111811;
            --surface2: #182018;
            --border: rgba(0, 200, 83, 0.15);
            --text: #E8F5E9;
            --muted: #6B7C6B;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background effects */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 200, 83, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 200, 83, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Grid pattern */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 200, 83, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 200, 83, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 60px rgba(0, 200, 83, 0.05), 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px var(--green-glow);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--green);
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-glow);
        }

        input::placeholder {
            color: var(--muted);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 20px var(--green-glow);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px var(--green-glow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn.loading .btn-text {
            display: none;
        }

        .btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 12px;
            color: var(--muted);
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .register-link a {
            color: var(--green);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: #FCA5A5;
            margin-bottom: 16px;
            display: none;
            animation: shake 0.4s ease;
        }

        .alert.show {
            display: block;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🦏</div>
            <div class="logo-text">Sewa <span>Badak</span></div>
        </div>

        <h1>Selamat Datang</h1>
        <p class="subtitle">Masuk ke akun Anda untuk mulai blast</p>

        <div class="alert" id="alertMsg"></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="user" placeholder="Masukkan username" autocomplete="username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="pass" placeholder="Masukkan password" autocomplete="current-password"
                onkeydown="if(event.key==='Enter') login()">
        </div>

        <button class="btn" onclick="login()" id="loginBtn">
            <span class="btn-text">Masuk</span>
            <div class="spinner"></div>
        </button>

        <div class="divider"><span>atau</span></div>

        <div class="register-link">
            Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </div>
    </div>

    <script>
        // Cek sudah login
        const token = localStorage.getItem('token');
        if (token) {
            // Verify token masih valid
            fetch('/api/user/profile', {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(r => r.json()).then(data => {
                if (data.username) {
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'index.html';
                }
            }).catch(() => localStorage.removeItem('token'));
        }

        function showAlert(msg) {
            const el = document.getElementById('alertMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        async function login() {
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value;

            if (!username || !password) {
                showAlert('Username dan password tidak boleh kosong.');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;
            document.getElementById('alertMsg').classList.remove('show');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    // Redirect berdasarkan role
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'index.html';
                } else {
                    showAlert(data.message || 'Login gagal. Periksa username dan password.');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch (err) {
                showAlert('Koneksi gagal. Pastikan server berjalan.');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
